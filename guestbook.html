<title>LCES: Guestbook - Liberty City Emergency Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* Re-enlist page specific styles — green accent overrides */
.guestbook-hero {
  text-align: center;
  padding: 1.15rem 0 1.5rem;
}
.guestbook-hero .badge-icon {
  font-size: 3.5rem;
  display: block;
  margin-bottom: 0.5rem;
  filter: drop-shadow(0 0 20px rgba(46,204,64,0.3));
  animation: badgePulse 3s ease-in-out infinite;
}
@keyframes badgePulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(26,138,255,0.3)); }
  50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(26,138,255,0.5)); }
}
.guestbook-hero h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.1rem, 3.5vw, 1.8rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-bright);
  text-shadow: 0 0 20px rgba(26,138,255,0.2);
  line-height: 1.2;
}
.guestbook-hero h1 .green { color: var(--green); }
.guestbook-hero p {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 0.5rem;
  letter-spacing: 0.05em;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

/* Green-accented form panel (reuses .panel + .form-section base styles) */
.panel.guestbook-panel {
  background: linear-gradient(135deg, #0f1f3a, #0a1628);
  position: relative;
  overflow: hidden;
}
.panel.guestbook-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(46,204,64,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.guestbook-panel .form-section input:focus,
.guestbook-panel .form-section textarea:focus {
  border-color: var(--green-dim);
  box-shadow: 0 0 0 2px rgba(46,204,64,0.08);
}

/* Form panel inherits .panel:hover — uniform blue bg/border */

/* ── Guestbook Entries expandable box ── */
.gb-entries-panel .gb-expand-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.55rem 1rem;
  margin-bottom: 0.5rem;
  font-family: 'Orbitron', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  color: var(--blue-bright);
  background: rgba(26,138,255,0.06);
  transition: all 0.2s ease;
}
.gb-entries-panel .gb-expand-btn:hover {
  background: rgba(26,138,255,0.14);
  border-color: var(--blue-dim);
  box-shadow: 0 2px 12px var(--blue-glow);
  transform: translateY(-1px);
}
.gb-entries-panel .gb-expand-btn:active {
  transform: translateY(0);
}
.gb-count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 1.3rem;
  height: 1.3rem;
  padding: 0 0.35rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--text-bright);
  background: var(--green-dim);
  border-radius: 10px;
  line-height: 1;
}
.gb-chevron {
  font-size: 0.55rem;
  transition: transform 0.2s ease;
  margin-left: auto;
}

.gb-btn-white { color: var(--text-bright); }
.gb-btn-blue  { color: var(--blue-bright); }

/* Entries panel inherits .panel:hover — uniform blue bg/border */

/* Teaser preview before expanding */
.gb-teaser {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.82rem;
  color: var(--text-dim);
  padding: 0.15rem 1.25rem 1.1rem;
  line-height: 1.5;
  border-radius: 6px;
  transition: text-shadow 0.3s ease, background 0.3s ease, opacity 0.35s ease;
  cursor: default;
}
.gb-teaser.fading {
  opacity: 0.2;
}
/* See #gb-entries-panel:hover for the container glow instead */
.gb-teaser-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 0.3rem;
}
.gb-teaser-label {
  display: inline-block;
  font-family: 'Orbitron', monospace;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blue-bright);
  opacity: 0.85;
}
.gb-teaser-refresh {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.1rem;
  height: 1.1rem;
  border: 1px solid rgba(26,138,255,0.3);
  border-radius: 50%;
  background: transparent;
  color: var(--blue-bright);
  font-size: 0.55rem;
  cursor: pointer;
  transition: all 0.2s ease;
  line-height: 1;
  padding: 0;
}
.gb-teaser-refresh:hover {
  background: rgba(26,138,255,0.1);
  border-color: var(--blue-bright);
  transform: translateX(2px);
  box-shadow: 0 0 8px rgba(26,138,255,0.2);
}
.gb-teaser-badge {
  font-size: 0.9rem;
  color: #76bcf0;
  font-weight: 700;
  text-shadow: 0 0 4px rgba(102,204,255,0.25);
}
.gb-teaser-time {
  display: inline-block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--text-bright);
  background: transparent;
  border: 1px solid rgba(46,204,64,0.55);
  box-shadow: 0 0 3px rgba(46,204,64,0.08);
  border-radius: 10px;
  padding: 0.1rem 0.5rem;
  margin-left: 0.4rem;
  vertical-align: middle;
  opacity: 1;
}
.gb-teaser-memo {
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  color: #b0bcd2;
  font-style: italic;
  line-height: 1.5;
}

/* Collapsible entries wrapper */
.gb-entries-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.gb-entries-wrap.gb-open {
  max-height: none;
}

/* Entry rows */
.gb-entries {
  margin-top: 0.75rem;
  padding-top: 0.5rem;
  padding-bottom: 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.gb-entries-wrap.gb-open .gb-entries {
  padding-bottom: 0.85rem;
}
.gb-entry {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 0.65rem;
  padding: 0.35rem 0.55rem;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: border-color 0.2s, background 0.2s;
}
.gb-entry:hover {
  border-color: rgba(26,138,255,0.2);
  background: rgba(26,138,255,0.04);
}
.gb-id-col {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex-shrink: 0;
  line-height: 1.3;
}
.gb-id-row {
  display: flex;
  align-items: baseline;
  gap: 0.15rem;
  flex-wrap: nowrap;
}
.gb-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  line-height: 1;
  color: #76bcf0;
  text-shadow: 0 0 4px rgba(102,204,255,0.25);
  white-space: pre;
}
.gb-gt {
  display: inline-block;
  width: 15ch;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem;
  color: var(--green);
  text-shadow: 0 0 8px rgba(46,204,64,0.25);
  white-space: nowrap;
}
.gb-sep {
  color: rgba(255,255,255,0.15);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  font-weight: 300;
  margin: 0 0.1rem;
  user-select: none;
}
.gb-aka {
  align-self: stretch;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--text-dim);
  opacity: 0.7;
  line-height: 1.3;
  text-align: center;
  word-break: break-all;
}
.gb-memo {
  font-family: 'Inter', sans-serif;
  font-size: 0.80rem;
  color: #b0bcd2;
  font-style: italic;
  line-height: 1.5;
  flex: 1;
  text-wrap: pretty;
}
.gb-memo.gb-default {
  color: #556680;
}
.gb-time {
  flex-shrink: 0;
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  font-style: normal;
  color: var(--text-bright);
  background: transparent;
  border: 1px solid rgba(46,204,64,0.55);
  box-shadow: 0 0 3px rgba(46,204,64,0.08);
  border-radius: 10px;
  padding: 0.1rem 0.5rem;
  line-height: 1.4;
  white-space: nowrap;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.gb-time:hover {
  border-color: rgba(46,204,64,0.8);
  box-shadow: 0 0 5px rgba(46,204,64,0.15);
}  @media (max-width: 480px) {
    .gb-teaser {
      padding: 0.1rem 0 0.55rem;
      font-size: 0.75rem;
    }
    .gb-teaser-badge {
      font-size: 0.82rem;
    }
    .gb-teaser-memo {
      font-size: 0.8rem;
    }
    .gb-teaser-time {
      font-size: 0.6rem;
    }
    .gb-entry {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.25rem;
      align-items: start;
    }
    .gb-id-col {
      grid-column: 1;
      grid-row: 1;
    }
    .gb-id-row {
      justify-content: flex-start;
    }
    .gb-aka {
      text-align: left;
    }
    .gb-memo {
      grid-column: 1 / -1;
      grid-row: 2;
    }
    .gb-time {
      grid-column: 2;
      grid-row: 1;
      margin-left: 0;
      align-self: start;
    }
  }

</style>

<body>
<div class="top-bar"></div><div class="bottom-bar"></div>
<div class="wrapper">
<div id="header" data-title="RE-ENLISTMENT"></div>
<script src="scripts/header.js"></script>
<script src="scripts/navbar.js"></script>

  <div class="guestbook-hero">
    <span class="badge-icon">&#x1faf5;</span>
    <h1>YOUR OLD BADGE <span class="green">IS WAITING</span></h1>
    <p>Re-enlistment is open to all former officers of LCES who want to patrol the streets of Liberty City again. Drop your credentials below and we&rsquo;ll get you on the roster with your old badge number.</p>
  </div>

  <div class="panel guestbook-panel">
    <div class="panel-label">GUESTBOOK</div>
    <h2 class="reenlist-heading">RE-ENLISTMENT</h2>
    <div id="enlist-form"></div>
    <script src="scripts/form.js"></script>
  </div>

  <!-- ── Guestbook Entries (expandable) ── -->
  <div class="panel gb-entries-panel" id="gb-entries-panel">
    <div class="panel-label">MESSAGES</div>
    <div style="text-align:center">
    <h2><span class="highlight">GUESTBOOK</span> ENTRIES</h2>
    <div class="gb-teaser" id="gb-teaser"></div>
    <button class="gb-expand-btn" id="gb-expand-btn" onclick="toggleGuestbookEntries()" aria-expanded="false">
      <span class="gb-btn-white" id="gb-w1">VIEW</span>
      <span class="gb-btn-blue" id="gb-b">MESSAGES</span>
      <span class="gb-btn-white" id="gb-w2" style="display:none"></span>
      <span class="gb-count-badge" id="gb-count-badge"></span>
      <span class="gb-chevron" id="gb-chevron">&#x25BC;</span>
    </button>
    </div>
    <div class="gb-entries-wrap" id="gb-entries-wrap">
      <div class="gb-entries" id="gb-entries"></div>
    </div>
  </div>

  <div class="divider"><span class="dot"></span> ENTER THE PRECINCT <span class="dot"></span></div>

  <div id="discord-cta"></div>
  <script src="scripts/discord.js"></script>

  <div id="footer"></div>
  <script src="scripts/footer.js"></script>
  <script src="scripts/reveal.js"></script>
  <script src="roster/roster-data.js"></script>
  <script src="roster/messages-data.js"></script>
  <script src="roster/badge-count.js"></script>
  <script>
    // ── Guestbook entries: cross-reference messages with roster data ──
    (function() {
      var messages = window.__messagesData || [];
      var roster = window.__rosterData || [];

      // Build a badge->gamertag lookup from roster
      var gtLookup = {};
      roster.forEach(function(o) {
        if (o.gamertag) gtLookup[String(o.badge)] = o.gamertag;
      });

      var NOW = new Date();

      function relativeTime(iso) {
        if (!iso) return '';
        var then = new Date(iso);
        if (isNaN(then.getTime())) return '';
        var diff = (NOW - then) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
        if (diff < 2592000) return Math.floor(diff / 604800) + 'w ago';
        if (diff < 31536000) return Math.floor(diff / 2592000) + 'mo ago';
        return Math.floor(diff / 31536000) + 'y ago';
      }      // Pad the badge so the 🛡 unicode icon + digits stay aligned across rows:
      //   1-digit badge → "  🛡1"  (2 leading NBSPs)
      //   2-digit badge → " 🛡12"  (1 leading NBSP)
      //   3-digit badge → "🛡123"  (no leading NBSP)
      function padBadge(n) {
        var padCount = 3 - String(n).length;
        return '\u00a0'.repeat(padCount) + '\uD83D\uDEE1' + n;
      }

      // Build entry rows with gamertag attached
      var entries = messages.map(function(m) {
        var rawGt = gtLookup[String(m.badge)] || 'Unknown';
        var parts = rawGt.split('/');
        var primary = parts[0].trim();
        var alts = parts.slice(1).map(function(s) { return s.trim(); }).filter(Boolean);
        return {
          badge: String(m.badge),
          gamertag: primary,
          alts: alts,
          memo: m.message,
          submittedAt: m.submittedAt || null,
          isDefault: !!m.isDefault
        };
      });

      // Sort by submittedAt descending (newest first), nulls last, then badge asc
      entries.sort(function(a, b) {
        if (a.submittedAt && b.submittedAt) return b.submittedAt.localeCompare(a.submittedAt);
        if (a.submittedAt) return -1;
        if (b.submittedAt) return 1;
        return Number(a.badge) - Number(b.badge);
      });

      // Update count badge
      var countEl = document.getElementById('gb-count-badge');
      if (countEl) countEl.textContent = entries.length;

      // Render a random entry into the teaser (never repeats back-to-back)
      var lastTeaserIdx = -1;
      function renderTeaser() {
        if (!entries.length) return;
        var idx;
        if (entries.length > 1) {
          do { idx = Math.floor(Math.random() * entries.length); } while (idx === lastTeaserIdx);
        } else {
          idx = 0;
        }
        lastTeaserIdx = idx;
        var pick = entries[idx];
        var teaser = document.getElementById('gb-teaser');
        if (!teaser) return;
        var t = '';
        if (pick.submittedAt) t = ' <span class="gb-teaser-time">' + escHTML(relativeTime(pick.submittedAt)) + '</span>';
        var memoText = pick.memo.length > 300 ? pick.memo.substring(0, 300) + '…' : pick.memo;
        teaser.innerHTML = '<div class="gb-teaser-header">' +
          '<span class="gb-teaser-label">RANDOM ENTRY</span>' +
          '<button class="gb-teaser-refresh" onclick="renderTeaser()" title="Show another entry">&#x21BB;</button>' +
          '</div>' +
          '<span class="gb-teaser-badge">Unit #' + escHTML(pick.badge) + '</span>' + t +
          '<br><span class="gb-teaser-memo">' + escHTML(memoText) + '</span>';
      }
      renderTeaser();
      window.renderTeaser = renderTeaser;

      // Auto-refresh teaser every 15 seconds, pause on hover or when expanded
      window.__teaserPaused = false;
      var teaserEl = document.getElementById('gb-teaser');
      if (teaserEl) {
        teaserEl.addEventListener('mouseenter', function() { window.__teaserPaused = true; });
        teaserEl.addEventListener('mouseleave', function() { window.__teaserPaused = false; });
      }
      setInterval(function() {
        if (!window.__teaserPaused) {
          if (teaserEl) teaserEl.classList.add('fading');
          setTimeout(function() {
            if (window.__teaserPaused) { if (teaserEl) teaserEl.classList.remove('fading'); return; }
            renderTeaser();
            if (teaserEl) teaserEl.classList.remove('fading');
          }, 350);
        }
      }, 8000);

      // Build HTML
      var listEl = document.getElementById('gb-entries');
      if (listEl && entries.length) {
        var html = '';
        entries.forEach(function(e) {
          var akaHtml = e.alts.length ? '<span class="gb-aka">AKA:\u2005' + escHTML(e.alts.join(', ')) + '</span>' : '';
          var timeStr = relativeTime(e.submittedAt);
          var timeHtml = timeStr ? '<span class="gb-time">' + escHTML(timeStr) + '</span>' : '';
          var memoClass = 'gb-memo' + (e.isDefault ? ' gb-default' : '');
          html += '<div class="gb-entry">' +
            '<div class="gb-id-col">' +
              '<div class="gb-id-row">' +
                '<span class="gb-badge">' + escHTML(padBadge(e.badge)) + '</span>' +
                '<span class="gb-sep">|</span>' +
                '<span class="gb-gt">' + escHTML(e.gamertag) + '</span>' +
              '</div>' +
              akaHtml +
            '</div>' +
            '<span class="' + memoClass + '">' + escHTML(e.memo) + '</span>' +
            timeHtml +
          '</div>';
        });
        listEl.innerHTML = html;
      }

      function escHTML(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
      }
    })();

    // ── Toggle expand/collapse ──
    function toggleGuestbookEntries() {
      var wrap = document.getElementById('gb-entries-wrap');
      var w1 = document.getElementById('gb-w1');
      var b  = document.getElementById('gb-b');
      var chev = document.getElementById('gb-chevron');
      var btn = document.getElementById('gb-expand-btn');
      var expanded = btn.getAttribute('aria-expanded') === 'true';
      if (!expanded) {
        wrap.style.maxHeight = wrap.scrollHeight + 'px';
        wrap.classList.add('gb-open');
        btn.setAttribute('aria-expanded', 'true');
        if (w1) w1.textContent = 'HIDE';
        if (b)  b.textContent  = 'MESSAGES';
        if (chev) chev.innerHTML = '&#x25B2;';
        window.__teaserPaused = true;
      } else {
        wrap.style.maxHeight = '0px';
        wrap.classList.remove('gb-open');
        btn.setAttribute('aria-expanded', 'false');
        if (w1) w1.textContent = 'VIEW';
        if (b)  b.textContent  = 'MESSAGES';
        if (chev) chev.innerHTML = '&#x25BC;';
        window.__teaserPaused = false;
      }
    }
  </script>
  <script src="analytics/config.js"></script>
  <script src="analytics/visitor.js"></script>
  <script src="analytics/whitelist.js"></script>
  <script src="analytics/dispatch.js"></script>
  <script src="analytics/tracker.js"></script>
  <script src="analytics/botfilter.js"></script>
  <script src="analytics/analytics.js"></script>
</div>
