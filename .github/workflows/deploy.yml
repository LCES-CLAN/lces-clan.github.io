# Deploy LCES Clan site to GitHub Pages
# Injects Discord webhook URLs from GitHub Secrets at deploy time
# so they don't live in the public repo.
#
# Required Secrets:
#   WEBHOOK_FORM_URL      — Discord webhook for re-enlistment form submissions
#   WEBHOOK_ANALYTICS_URL — Discord webhook for analytics tracking
#
# Set them in: https://github.com/{owner}/{repo}/settings/secrets/actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject webhook URLs from Secrets
        env:
          FORM_URL: ${{ secrets.WEBHOOK_FORM_URL }}
          ANALYTICS_URL: ${{ secrets.WEBHOOK_ANALYTICS_URL }}
        run: |
          # Replace empty-string placeholders with the real webhook URLs.
          # Using Python avoids bash expansion issues with special characters
          # (e.g., $, `, " in webhook tokens) that would break sed.
          python3 -c """
          import os, pathlib

          replacements = [
              (pathlib.Path('scripts/form.js'),      'WEBHOOK_URL',   os.environ.get('FORM_URL', '')),
              (pathlib.Path('analytics/config.js'),  'webhookUrl',    os.environ.get('ANALYTICS_URL', '')),
          ]

          for path, key, val in replacements:
              content = path.read_text()
              old = f"{key} = ''" if key == 'WEBHOOK_URL' else f"{key}: ''"
              new = f"{key} = '{val}'" if key == 'WEBHOOK_URL' else f"{key}: '{val}'"
              if old not in content:
                  print(f'  [WARN] Pattern "{old}" not found in {path}')
                  continue
              content = content.replace(old, new)
              path.write_text(content)
              print(f'  [OK] {path} — injected' if val else f'  [WARN] {path} — EMPTY secret, placeholder unchanged')
          """

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
