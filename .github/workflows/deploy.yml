# Deploy LCES Clan site to GitHub Pages
# Injects Discord webhook URLs from GitHub Secrets at deploy time
# so they don't live in the public repo.
#
# Required Secrets:
#   WEBHOOK_FORM_URL      — Discord webhook for re-enlistment form submissions
#   WEBHOOK_ANALYTICS_URL — Discord webhook for analytics tracking
#
# Set them in: https://github.com/{owner}/{repo}/settings/secrets/actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject webhook URLs from Secrets
        run: |
          sed -i "s|{{WEBHOOK_FORM_URL}}|${{ secrets.WEBHOOK_FORM_URL }}|g" scripts/form.js
          sed -i "s|{{WEBHOOK_ANALYTICS_URL}}|${{ secrets.WEBHOOK_ANALYTICS_URL }}|g" analytics/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
