# Deploy LCES Clan site to GitHub Pages
# Injects Discord webhook URLs from GitHub Secrets at deploy time
# so they don't live in the public repo.
#
# Required Secrets:
#   WEBHOOK_FORM_URL      — Discord webhook for re-enlistment form submissions
#   WEBHOOK_ANALYTICS_URL — Discord webhook for analytics tracking
#
# Set them in: https://github.com/{owner}/{repo}/settings/secrets/actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject webhook URLs from Secrets
        env:
          FORM_URL: ${{ secrets.WEBHOOK_FORM_URL }}
          ANALYTICS_URL: ${{ secrets.WEBHOOK_ANALYTICS_URL }}
        run: |
          # Replace empty-string placeholders with the real webhook URLs.
          # Written to a temp file and executed to avoid bash mangling quotes.
          python3 << 'EOF'
          import os, pathlib

          replacements = [
              (pathlib.Path('scripts/form.js'),      'WEBHOOK_URL',   os.environ.get('FORM_URL', '')),
              (pathlib.Path('analytics/config.js'),  'webhookUrl',    os.environ.get('ANALYTICS_URL', '')),
          ]

          for path, key, val in replacements:
              content = path.read_text()
              old = key + " = ''" if key == 'WEBHOOK_URL' else key + ": ''"
              new = key + " = '" + val + "'" if key == 'WEBHOOK_URL' else key + ": '" + val + "'"
              if old not in content:
                  print('  [WARN] Pattern "' + old + '" not found in ' + str(path))
                  continue
              content = content.replace(old, new)
              path.write_text(content)
              if val:
                  print('  [OK] ' + str(path) + ' — injected')
              else:
                  print('  [WARN] ' + str(path) + ' — EMPTY secret, placeholder unchanged')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
