<script src="scripts/head.js"></script>
<style>
/* 404 specific styles */
.error-hero {
  text-align: center;
  padding: 2.5rem 0 1.5rem;
  position: relative;
}
.error-code {
  font-family: 'Orbitron', monospace;
  font-size: clamp(3.5rem, 12vw, 7rem);
  font-weight: 900;
  line-height: 1;
  color: var(--blue-bright);
  text-shadow: 0 0 40px rgba(26,138,255,0.3), 0 0 80px rgba(26,138,255,0.1);
  letter-spacing: 0.05em;
  animation: errorFlicker 4s ease-in-out infinite;
}
.error-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(0.85rem, 2.5vw, 1.15rem);
  color: var(--text);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}
.error-label {
  display: inline-block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  color: var(--blue);
  letter-spacing: 0.15em;
  border: 1px solid var(--blue-dim);
  border-radius: 3px;
  padding: 0.2rem 0.6rem;
  margin-top: 0.75rem;
}

/* Slow flicker for the 404 code */
@keyframes errorFlicker {
  0%, 100% { opacity: 1; text-shadow: 0 0 40px rgba(26,138,255,0.3), 0 0 80px rgba(26,138,255,0.1); }
  30% { opacity: 1; text-shadow: 0 0 40px rgba(26,138,255,0.3), 0 0 80px rgba(26,138,255,0.1); }
  31% { opacity: 0.5; text-shadow: 0 0 10px rgba(26,138,255,0.1); }
  32% { opacity: 1; text-shadow: 0 0 40px rgba(26,138,255,0.3), 0 0 80px rgba(26,138,255,0.1); }
  35% { opacity: 1; }
  36% { opacity: 0.3; text-shadow: none; }
  37% { opacity: 1; text-shadow: 0 0 40px rgba(26,138,255,0.3), 0 0 80px rgba(26,138,255,0.1); }
}

.error-details {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto;
}
.error-details strong {
  color: var(--text-bright);
}
.error-details .code-ref {
  font-family: 'Share Tech Mono', monospace;
  color: var(--blue);
  font-size: 0.9rem;
}

/* Scan-line overlay for the panel */
.panel.error-panel {
  position: relative;
  overflow: hidden;
}
.panel.error-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(26,138,255,0.015) 2px,
    rgba(26,138,255,0.015) 4px
  );
  pointer-events: none;
}

@media (max-width: 480px) {
  .error-hero { padding: 1.5rem 0 1rem; }
}
</style>
</head>
<body>
<div class="top-bar"></div><div class="bottom-bar"></div>
<div class="wrapper">
<div id="header" data-title="Page Not Found"></div>
<script src="scripts/header.js"></script>
<script src="scripts/navbar.js"></script>

  <div class="panel error-panel reveal">

    <div class="error-hero">
      <div class="error-code">10-7</div>
      <div class="error-sub">Out of Service</div>
      <span class="error-label">Signal Lost · 404</span>
    </div>

    <div class="error-details" style="text-align:center">
      <p>The page you're looking for is out of service.</p>
      <p>It may have been <strong>reassigned</strong>, <strong>relocated</strong>, or <strong>never dispatched</strong> to begin with. Check your coordinates and try again.</p>
    </div>

    <div class="cta-buttons" style="margin-top: 1.5rem;">
      <a href="./" class="btn btn-secondary">Return to HQ</a>
    </div>
  </div>

  <div class="divider"><span class="dot"></span> ENTER THE PRECINCT <span class="dot"></span></div>

  <div id="discord-cta"></div>
  <script src="scripts/discord.js"></script>

  <div id="footer"></div>
  <script src="scripts/footer.js"></script>

  <!-- Analytics -->
  <script src="analytics/config.js"></script>
  <script src="analytics/visitor.js"></script>
  <script src="analytics/whitelist.js"></script>
  <script src="analytics/dispatch.js"></script>
  <script src="analytics/tracker.js"></script>
  <script src="analytics/analytics.js"></script>
</div>

<script src="scripts/reveal.js"></script>
</body>
